services:
  mysql:
    image: mysql:8.0
    container_name: juria-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jure_ai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: juria-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"     # HTTP
      - "6334:6334"     # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    # ✅ Healthcheck qui marche même si curl OU wget manque
    healthcheck:
      test: ["CMD-SHELL", "sh -c '(command -v curl >/dev/null 2>&1 && curl -fsS http://localhost:6333/healthz) || (command -v wget >/dev/null 2>&1 && wget -qO- http://localhost:6333/healthz) || exit 1'"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  node:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: juria-node
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: mysql://root:root@mysql:3306/jure_ai
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8787:8787"
    volumes:
      - ./:/app
      - ./uploads:/app/uploads

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: juria-phpmyadmin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8890:80"

volumes:
  mysql_data:
  qdrant_storage:
